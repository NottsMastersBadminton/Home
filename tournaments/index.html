<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tournaments — Notts Masters Badminton</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 20px 40px;
      border-radius: 10px;
      font-size: 1.4rem;
      font-weight: 600;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .senior {
      background: #0077cc;
    }
    .senior:hover {
      background: #005fa3;
    }

    .masters {
      background: #444;
    }
    .masters:hover {
      background: #222;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Tournaments</h1>
  <p>Senior & Masters Tournament Links</p>
</header>

<!-- Shared nav include -->
<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("nav").innerHTML = data;
    });
</script>

<div class="container">
  <h2>Select Tournament Type</h2>

  <div class="button-row">
    <a class="btn senior" href="https://badminfo.com/Seniors" target="_blank">
      Senior Tournaments
    </a>

    <a class="btn masters" href="https://badminfo.com/Masters" target="_blank">
      Masters Tournaments
    </a>
  </div>
</div>

<footer>
  © Notts Masters Badminton — Tournaments
</footer>

</body>
</html>
