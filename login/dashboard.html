<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Member Dashboard — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    body > div {
      margin: 0 !important;
      padding: 0 !important;
      max-width: 100% !important;
    }

    .page-wrapper {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #0a1a33;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eee;
      font-size: 0.85rem;
      margin-left: 6px;
    }

    button {
      margin-top: 20px;
      padding: 10px 16px;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
<div class="page-wrapper">

  <header>
    <h1>Notts Masters Badminton</h1>
    <p>Member Dashboard</p>
  </header>

  <!-- Shared nav include -->
  <div id="nav"></div>
  <script>
    fetch("/Home/nav.html")
      .then(r => r.text())
      .then(html => document.getElementById("nav").innerHTML = html);
  </script>

  <div class="container">
    <h2>Your Details</h2>

    <div id="content"></div>

    <button id="logout">Log out</button>
  </div>

  <footer>
    © Notts Masters Badminton — Dashboard
  </footer>

</div>

<script>
  const raw = localStorage.getItem("clubSession");
  if (!raw) window.location.href = "login.html";

  let session;
  try { session = JSON.parse(raw); }
  catch { localStorage.removeItem("clubSession"); window.location.href = "login.html"; }

  if (!session || !session.loggedIn) window.location.href = "login.html";

  const content = document.getElementById("content");
  content.innerHTML = `
    <p><strong>${session.firstname} ${session.surname}</strong></p>
    <p>Email: ${session.email_address}</p>
    <p>Membership ID: ${session.be_number}</p>
    <p>Age group: ${session.age_group || "N/A"}</p>
    <p>Role: <span class="tag">${session.captain_selector || "Player"}</span></p>
  `;

  document.getElementById("logout").addEventListener("click", () => {
    localStorage.removeItem("clubSession");
    window.location.href = "login.html";
  });
</script>

</body>
</html>
