<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Notts Masters Badminton | Nottinghamshire Masters Badminton Club</title>
  <meta name="description" content="Official site for Notts Masters Badminton. Fixtures, results, officials, documents and county Masters badminton information for Nottinghamshire." />
  <meta name="robots" content="index, follow" />

  <link rel="icon" href="/Home/favicon.png" type="image/png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5; /* OLD HOMEPAGE BACKGROUND */
      color: #222;
      overflow-x: hidden;
    }

    .page-wrapper {
      max-width: 1000px; /* OLD HOMEPAGE WIDTH */
      margin: 0 auto;
    }

    header {
      background: #0a1a33; /* OLD DARK BLUE HEADER */
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b; /* OLD NAV BAR COLOUR */
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* ⭐ FULL ARTICLE LIST (NEW SYSTEM) ⭐ */
    .home-articles {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin-top: 40px;
      padding: 0 20px;
      text-align: left;
    }

    .article-card {
      background: white; /* MATCH OLD PAGE WHITE CONTENT BOX */
      color: #222;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }

    .article-title {
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: #0a1a33; /* OLD HEADER BLUE */
    }

    .article-date {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    .article-card img {
      width: 100%;
      max-width: 500px;
      height: auto;
      margin: 15px 0;
      border-radius: 6px;
    }

    .gallery-img {
      width: 100%;
      max-width: 300px;
      margin: 10px 10px 10px 0;
      border-radius: 6px;
    }

    .article-text {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .bottom-banner {
      width: 100%;
      margin-top: 40px;
    }

    .bottom-banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      background: #0a1a33; /* OLD FOOTER BLUE */
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<div class="page-wrapper">

  <header>
    <h1>Notts Masters Badminton</h1>
  </header>

  <!-- Shared nav include -->
  <div id="nav"></div>
  <script>
    fetch("/Home/nav.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("nav").innerHTML = data;
      });
  </script>

  <!-- ⭐ FULL ARTICLE LIST ⭐ -->
  <div id="home-articles" class="home-articles"></div>

  <!-- ⭐ Clickable bottom banner -->
  <div class="bottom-banner">
    <a href="/Home/">
      <img src="/Home/documents/storage/Banner.jpg" alt="Notts Masters Banner">
    </a>
  </div>

  <footer>
    © Notts Masters Badminton — Home
  </footer>

</div>

<!-- ⭐ FULL ARTICLE LOADER ⭐ -->
<script>
fetch('/Home/assets/data/articles.json')
  .then(response => response.json())
  .then(articles => {

    // Sort newest → oldest
    articles.sort((a, b) => new Date(b.date) - new Date(a.date));

    const container = document.getElementById('home-articles');

    articles.forEach(article => {
      const card = document.createElement('div');
      card.className = 'article-card';

      const mainImage = article.image
        ? `<img src="${article.image}" alt="${article.title}">`
        : '';

      const galleryImages = article.gallery && article.gallery.length
        ? article.gallery.map(img => `<img src="${img}" class="gallery-img">`).join('')
        : '';

      card.innerHTML = `
        <h2 class="article-title">${article.title}</h2>
        <div class="article-date">${new Date(article.date).toLocaleDateString()}</div>
        ${mainImage}
        <p class="article-text">${article.content}</p>
        <div class="article-gallery">${galleryImages}</div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>
