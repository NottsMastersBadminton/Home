<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Notts Masters Badminton | Nottinghamshire Masters Badminton Club</title>
  <meta name="description" content="Official site for Notts Masters Badminton." />
  <meta name="robots" content="index, follow" />

  <link rel="icon" href="/Home/favicon.png" type="image/png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
      width: 100%;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .page-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ⭐ ABOUT SECTION */
    .about-section {
      margin-bottom: 40px;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .about-section h2 {
      color: #0a1a33;
      margin-bottom: 10px;
    }

    /* ⭐ ARTICLE DISPLAY */
    .article-card {
      background: white;
      color: #222;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
      width: 100%;
      box-sizing: border-box;
    }

    .article-title {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #0a1a33;
    }

    .article-date {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .article-card img {
      width: 100%;
      height: auto;
      margin: 20px 0;
      border-radius: 6px;
    }

    .gallery-img {
      width: 48%;
      margin: 1%;
      border-radius: 6px;
    }

    .article-text {
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    /* ⭐ PAGINATION */
    .pagination {
      text-align: center;
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .pagination button {
      background: #13294b;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      min-width: 45px;
    }

    .pagination button.active {
      background: #0a1a33;
      font-weight: bold;
    }

    .pagination button:hover {
      background: #0c3a6b;
    }

    /* ⭐ BOTTOM BANNER */
    .bottom-banner {
      width: 100%;
      margin-top: 40px;
    }

    .bottom-banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ⭐ FOOTER */
    footer {
      width: 100%;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
      margin-top: 40px;
    }

    /* ⭐ MOBILE FIXES */
    @media (max-width: 600px) {
      .article-title {
        font-size: 1.6rem;
      }

      .article-text {
        font-size: 1.05rem;
      }

      .gallery-img {
        width: 100%;
        margin: 10px 0;
      }

      .page-wrapper {
        padding: 10px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Notts Masters Badminton</h1>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div class="page-wrapper">

  <!-- ⭐ ABOUT SECTION -->
  <div class="about-section">
    <h2>About Us</h2>
    <p>
      Notts Masters Badminton: continuing a long county tradition of competitive age‑group play.
      Fielding teams from O40s through to O70s and providing fixtures, results, documents, and captain resources.
    </p>
  </div>

  <!-- ⭐ ARTICLE + PAGINATION -->
  <div id="article-container"></div>
  <div id="pagination" class="pagination"></div>

</div>

<div class="bottom-banner">
  <a href="/Home/">
    <img src="/Home/documents/storage/Banner.jpg" alt="Notts Masters Banner">
  </a>
</div>

<footer>
  © Notts Masters Badminton — Home
</footer>

<script>
fetch('/Home/assets/data/articles.json')
  .then(response => response.json())
  .then(articles => {

    articles.sort((a, b) => new Date(b.date) - new Date(a.date));

    const articleContainer = document.getElementById('article-container');
    const pagination = document.getElementById('pagination');

    function showArticle(index) {
      const article = articles[index];

      const mainImage = article.image
        ? `<img src="${article.image}" alt="${article.title}">`
        : '';

      const galleryImages = article.gallery && article.gallery.length
        ? article.gallery.map(img => `<img src="${img}" class="gallery-img">`).join('')
        : '';

      articleContainer.innerHTML = `
        <div class="article-card">
          <h2 class="article-title">${article.title}</h2>
          <div class="article-date">${new Date(article.date).toLocaleDateString("en-GB")}</div>
          ${mainImage}
          <p class="article-text">${article.content}</p>
          <div class="article-gallery">${galleryImages}</div>
        </div>
      `;
    }

    function buildPagination() {
      pagination.innerHTML = "";
      articles.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        btn.onclick = () => {
          showArticle(index);
          document.querySelectorAll(".pagination button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        };
        if (index === 0) btn.classList.add("active");
        pagination.appendChild(btn);
      });
    }

    showArticle(0);
    buildPagination();
  });
</script>

</body>
</html>
