
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Notts Masters Badminton | News & Updates</title>
  <meta name="description" content="Latest news and updates from Nottinghamshire Masters Badminton." />
  <meta name="robots" content="index, follow" />

  <link rel="icon" href="/Home/favicon.png" type="image/png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #06261C;
      color: white;
      overflow-x: hidden;
    }

    .page-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    header {
      background: #083024;
      padding: 25px;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* ⭐ FULL ARTICLE LIST ⭐ */
    .home-articles {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin-top: 40px;
      padding: 0 20px;
    }

    .article-card {
      background: #083024;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .article-title {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    .article-date {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    .article-card img {
      width: 100%;
      max-width: 500px;
      height: auto;
      margin: 15px 0;
      border-radius: 6px;
    }

    .gallery-img {
      width: 100%;
      max-width: 300px;
      margin: 10px 10px 10px 0;
      border-radius: 6px;
    }

    .article-text {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .bottom-banner img {
      width: 100%;
      display: block;
      margin-top: 40px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #083024;
      font-size: 0.9rem;
      margin-top: 40px;
    }
  </style>
</head>

<body>
<div class="page-wrapper">

  <header>Notts Masters Badminton — Latest News</header>

  <!-- Shared nav include -->
  <div id="nav"></div>
  <script>
    fetch("/Home/nav.html")
      .then(r => r.text())
      .then(html => document.getElementById("nav").innerHTML = html);
  </script>

  <!-- ⭐ FULL ARTICLE LIST ⭐ -->
  <div id="home-articles" class="home-articles"></div>

  <!-- Bottom banner -->
  <div class="bottom-banner">
    <a href="/Home/">
      <img src="/Home/documents/storage/Banner.jpg" alt="Notts Masters Banner">
    </a>
  </div>

  <footer>© Notts Masters Badminton — Home</footer>

</div>

<!-- ⭐ FULL ARTICLE LOADER ⭐ -->
<script>
fetch('/Home/assets/data/articles.json')
  .then(response => response.json())
  .then(articles => {

    // Sort newest → oldest
    articles.sort((a, b) => new Date(b.date) - new Date(a.date));

    const container = document.getElementById('home-articles');

    articles.forEach(article => {
      const card = document.createElement('div');
      card.className = 'article-card';

      // Main image
      const mainImage = article.image
        ? `<img src="${article.image}" alt="${article.title}">`
        : '';

      // Extra gallery images
      const galleryImages = article.gallery && article.gallery.length
        ? article.gallery.map(img => `<img src="${img}" class="gallery-img">`).join('')
        : '';

      card.innerHTML = `
        <h2 class="article-title">${article.title}</h2>
        <div class="article-date">${new Date(article.date).toLocaleDateString()}</div>
        ${mainImage}
        <p class="article-text">${article.content}</p>
        <div class="article-gallery">${galleryImages}</div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>
