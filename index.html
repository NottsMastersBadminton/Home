<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Notts Masters Badminton | Nottinghamshire Masters Badminton Club</title>
  <meta name="description" content="Official site for Notts Masters Badminton." />
  <meta name="robots" content="index, follow" />

  <link rel="icon" href="/Home/favicon.png" type="image/png" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    /* ⭐ FULL-WIDTH HEADER */
    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    /* ⭐ FULL-WIDTH NAV */
    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
      width: 100%;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* ⭐ CONTENT WRAPPER (1000px wide) */
    .page-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* ⭐ FULL ARTICLE FEED */
    .home-articles {
      display: flex;
      flex-direction: column;
      gap: 60px;
      text-align: left;
    }

    .article-card {
      background: white;
      color: #222;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
      width: 100%;
    }

    .article-title {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #0a1a33;
    }

    .article-date {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .article-card img {
      width: 100%;
      max-width: 900px;
      height: auto;
      margin: 20px 0;
      border-radius: 6px;
    }

    .gallery-img {
      width: 100%;
      max-width: 400px;
      margin: 10px 20px 10px 0;
      border-radius: 6px;
    }

    .article-text {
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    /* ⭐ FULL-WIDTH BOTTOM BANNER */
    .bottom-banner {
      width: 100%;
      margin-top: 40px;
    }

    .bottom-banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ⭐ FULL-WIDTH FOOTER */
    footer {
      width: 100%;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- ⭐ FULL-WIDTH HEADER -->
  <header>
    <h1>Notts Masters Badminton</h1>
  </header>

  <!-- ⭐ FULL-WIDTH NAV -->
  <div id="nav"></div>
  <script>
    fetch("/Home/nav.html")
      .then(r => r.text())
      .then(html => document.getElementById("nav").innerHTML = html);
  </script>

  <!-- ⭐ CONTENT WRAPPER -->
  <div class="page-wrapper">
    <div id="home-articles" class="home-articles"></div>
  </div>

  <!-- ⭐ FULL-WIDTH BOTTOM BANNER -->
  <div class="bottom-banner">
    <a href="/Home/">
      <img src="/Home/documents/storage/Banner.jpg" alt="Notts Masters Banner">
    </a>
  </div>

  <!-- ⭐ FULL-WIDTH FOOTER -->
  <footer>
    © Notts Masters Badminton — Home
  </footer>

<!-- ⭐ FULL ARTICLE LOADER ⭐ -->
<script>
fetch('/Home/assets/data/articles.json')
  .then(response => response.json())
  .then(articles => {

    // Sort newest → oldest
    articles.sort((a, b) => new Date(b.date) - new Date(a.date));

    const container = document.getElementById('home-articles');

    articles.forEach(article => {
      const card = document.createElement('div');
      card.className = 'article-card';

      const mainImage = article.image
        ? `<img src="${article.image}" alt="${article.title}">`
        : '';

      const galleryImages = article.gallery && article.gallery.length
        ? article.gallery.map(img => `<img src="${img}" class="gallery-img">`).join('')
        : '';

      card.innerHTML = `
        <h2 class="article-title">${article.title}</h2>
        <div class="article-date">${new Date(article.date).toLocaleDateString()}</div>
        ${mainImage}
        <p class="article-text">${article.content}</p>
        <div class="article-gallery">${galleryImages}</div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>
