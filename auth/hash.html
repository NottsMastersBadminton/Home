<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SHA‑256 Hash Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    h2 {
      margin-bottom: 10px;
    }
    input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-left: 10px;
    }
    pre {
      background: #fff;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>SHA‑256 Hash Generator</h2>
  <p>Enter a password to generate its SHA‑256 hash:</p>

  <input id="pw" type="text" placeholder="Enter password…" />
  <button onclick="go()">Generate</button>

  <pre id="out">Hash will appear here…</pre>

  <script>
    async function go() {
      const msg = document.getElementById("pw").value;
      if (!msg) {
        document.getElementById("out").textContent = "Please enter a password.";
        return;
      }

      const enc = new TextEncoder().encode(msg);
      const buf = await crypto.subtle.digest("SHA-256", enc);
      const hash = [...new Uint8Array(buf)]
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");

      document.getElementById("out").textContent = hash;
    }
  </script>

</body>
</html>
