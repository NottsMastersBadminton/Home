<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains & Selectors Area — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .auth-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      margin-bottom: 40px;
    }

    .password-wrapper {
      position: relative;
      margin-bottom: 15px;
    }

    .password-wrapper input {
      width: 100%;
      padding: 10px 40px 10px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.2rem;
      color: #555;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #1a73e8;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }

    button:hover {
      background: #1558b4;
    }

    .error {
      margin-top: 12px;
      color: #c62828;
      font-size: 0.9rem;
      display: none;
    }

    .links-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .link-button {
      display: block;
      background: #13294b;
      color: white;
      padding: 12px 15px;
      margin: 10px 0;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .link-button:hover {
      background: #0a1a33;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>Notts Masters Badminton</h1>
  <p>Captains & Selectors Area</p>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div class="container">

  <!-- PASSWORD BOX -->
  <div id="authBox" class="auth-box">
    <h2>Enter Password</h2>
    <p>Restricted to Captains & Selectors.</p>

    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Enter password" autocomplete="off" />
      <span class="toggle-password" id="togglePassword">👁️</span>
    </div>

    <button id="submitBtn">Unlock Area</button>
    <div id="error" class="error">❌ Incorrect password. Please try again.</div>
  </div>

  <!-- LINKS AFTER LOGIN -->
  <div id="linksBox" class="links-box" style="display:none;">
    <h2>Welcome</h2>
    <p>Select an option below:</p>

    <a class="link-button" href="/Home/captains/calendar.html">📅 Captains Calendar</a>
    <a class="link-button" href="/Home/captains/documents.html">📄 Documents</a>
    <a class="link-button" href="/Home/captains/contact.html">📞 Contact</a>
  </div>

</div>

<footer>
  © Notts Masters Badminton — Captains Area
</footer>

<script>
  const PASSWORD = "YourStrongPassword123";
  const SESSION_KEY = "captainsAuth";

  const passwordInput = document.getElementById("password");
  const togglePassword = document.getElementById("togglePassword");
  const submitBtn = document.getElementById("submitBtn");
  const errorEl = document.getElementById("error");
  const authBox = document.getElementById("authBox");
  const linksBox = document.getElementById("linksBox");

  function showLinks() {
    authBox.style.display = "none";
    linksBox.style.display = "block";
  }

  if (sessionStorage.getItem(SESSION_KEY) === PASSWORD) {
    showLinks();
  }

  togglePassword.addEventListener("click", () => {
    passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    togglePassword.textContent = passwordInput.type === "password" ? "👁️" : "🙈";
  });

  function unlock() {
    if (passwordInput.value.trim() === PASSWORD) {
      errorEl.style.display = "none";
      sessionStorage.setItem(SESSION_KEY, PASSWORD);
      showLinks();
    } else {
      errorEl.style.display = "block";
    }
  }

  submitBtn.addEventListener("click", unlock);
  passwordInput.addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
</script>

</body>
</html>
